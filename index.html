<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile Fleet Invoice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono&family=Special+Elite&family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }
        
        /* A4 Page Styling for Web Preview */
        .invoice-container {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 0;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
            overflow: visible;
        }

        .print-only {
            display: none !important;
        }

        @media screen {
            .invoice-preview-scale {
                transform: scale(0.85);
                transform-origin: top center;
            }
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                height: auto !important;
                overflow: hidden !important;
                background: white !important;
            }
            
            #root { 
                display: none !important; 
            }

            .print-only { 
                display: block !important; 
                visibility: visible !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 210mm !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                z-index: 99999 !important;
            }

            .invoice-container {
                width: 210mm !important;
                min-height: 0 !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                border: none !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: flex-start !important;
                page-break-after: auto !important;
                page-break-inside: auto !important;
                transform: scale(var(--print-scale, 1)) !important;
                transform-origin: top center !important;
            }

            .invoice-container > * {
                page-break-inside: avoid;
            }

            .flex-1 {
                page-break-inside: auto !important;
            }

            table {
                page-break-inside: auto !important;
            }

            tr {
                page-break-inside: avoid !important;
                page-break-after: auto !important;
            }

            thead {
                display: table-header-group !important;
            }

            tfoot {
                display: table-footer-group !important;
            }
            
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* Utility classes for word monitoring */
        .break-words {
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .no-break {
            page-break-inside: avoid !important;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.475.0?deps=react@19.0.0",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>
    <!-- Entry point script -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
